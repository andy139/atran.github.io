<style>
  :root {
    --bg: 30 9% 5%;
    --fg: 40 20% 92%;
    --primary: 36 92% 62%;
    --primary-fg: 30 8% 8%;
    --muted: 30 6% 12%;
    --muted-fg: 35 8% 58%;
    --border: 30 6% 17%;
    --card: 30 7% 9%;
    --ok: 140 55% 55%;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: hsl(var(--bg));
    color: hsl(var(--fg));
    font-family: "Geist Mono", ui-monospace, Menlo, monospace;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(hsl(var(--primary)/0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: overlay;
    z-index: 1;
  }

  .sans { font-family: "Geist", ui-sans-serif, system-ui, sans-serif; }
  .mono { font-family: "Geist Mono", ui-monospace, monospace; }
  .serif-italic { font-family: "Instrument Serif", serif; font-style: italic; font-weight: 400; letter-spacing: 0; }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input { outline: none; }

  ::selection { background: hsl(var(--primary) / 0.35); color: hsl(var(--fg)); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: hsl(var(--bg)); }
  ::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-fg) / 0.5); }

  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { display: flex; width: max-content; animation: marquee var(--marquee-speed, 50s) linear infinite; }
  .marquee:hover .marquee-track { animation-play-state: paused; }

  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .blink { animation: blink 1.05s steps(2, start) infinite; }

  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.9); opacity: 0.15; }
  }
  .pulse-halo {
    position: relative; display: inline-block;
  }
  .pulse-halo::after {
    content: ""; position: absolute; inset: 0;
    border-radius: 999px; background: inherit;
    animation: pulseDot 2.2s ease-in-out infinite;
  }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease-out, transform 0.7s ease-out; }
  .reveal.in  { opacity: 1; transform: translateY(0); }

  .blur-word {
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(14px);
    transition: opacity 0.5s ease-out, filter 0.5s ease-out, transform 0.5s ease-out;
    will-change: filter, transform, opacity;
  }
  .blur-word.in { opacity: 1; filter: blur(0); transform: translateY(0); }

  .glass {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .stream-caret::after {
    content: "▍";
    display: inline-block;
    margin-left: 2px;
    color: hsl(var(--primary));
    animation: blink 0.9s steps(2) infinite;
  }

  .work-frame { transition: box-shadow 0.5s ease, transform 0.5s ease, border-color 0.5s ease; }
  .work-frame:hover {
    box-shadow:
      0 0 0 1px hsl(var(--primary)/0.3),
      0 30px 80px -20px hsl(var(--primary)/0.25),
      0 0 80px -10px hsl(var(--primary)/0.18);
    transform: translateY(-3px);
  }

  #dot-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg { animation: msgIn 0.35s ease-out both; }

  input:focus, button:focus-visible, a:focus-visible {
    outline: 1px solid hsl(var(--primary)/0.6);
    outline-offset: 2px;
  }

  .amber { color: hsl(var(--primary)); }
  .muted { color: hsl(var(--muted-fg)); }
  .hairline { height: 1px; background: hsl(var(--border)); }

  .link-amber { color: hsl(var(--primary)); border-bottom: 1px solid hsl(var(--primary)/0.4); padding-bottom: 1px; transition: border-color 0.2s; }
  .link-amber:hover { border-bottom-color: hsl(var(--primary)); }

  @media (max-width: 720px) {
    #work > div > div { grid-template-columns: 1fr !important; gap: 32px !important; }
    #work > div > div > div:first-child { order: 2 !important; }
    #work > div > div > div:last-child { order: 1 !important; }
    nav > div > div:nth-child(2) { display: none !important; }
  }
</style>
